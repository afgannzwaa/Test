<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Finder - Galaxy Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* CSS LANGSUNG DI SINI */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Background menggunakan gradasi yang mirip dengan gambar nebula kamu */
            background: radial-gradient(circle at top right, #3d0066, #00001a, #003333);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Efek Kaca (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 242, 255, 0.4);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        h1 span {
            color: #00f2ff;
            text-shadow: 0 0 10px #00f2ff;
        }

        p {
            font-weight: 300;
            opacity: 0.8;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .search-group {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #00f2ff;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        button {
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(90deg, #00f2ff, #7d00ff);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 20px rgba(125, 0, 255, 0.4);
        }

        .status-area {
            margin-top: 25px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            display: none; /* Sembunyi sebelum ada ketikan */
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #keyword-preview {
            color: #00f2ff;
            font-weight: 600;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.7rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>NEBULA<span>FINDER</span></h1>
        <p>Cari gambar di Google secara instan</p>

        <div class="search-group">
            <input type="text" id="query" placeholder="Ketik kata kunci (Contoh: Growtopia DL)" autocomplete="off">
            <button onclick="executeSearch()">Buka Hasil Gambar</button>
        </div>

        <div class="status-area" id="statusBox">
            <small>Menuju pencarian:</small><br>
            <span id="keyword-preview"></span>
        </div>

        <div class="footer">
            Dibuat untuk mempermudah pencarian aset visual.
        </div>
    </div>

    <script>
        /* JAVASCRIPT LANGSUNG DI SINI */
        const inputField = document.getElementById('query');
        const statusBox = document.getElementById('statusBox');
        const previewText = document.getElementById('keyword-preview');

        // Fungsi untuk mencari ke Google Images
        function executeSearch() {
            const val = inputField.value.trim();
            if (val !== "") {
                // Link Google Images
                const searchUrl = `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(val)}`;
                window.open(searchUrl, '_blank');
            } else {
                alert("Ketik sesuatu dulu ya!");
            }
        }

        // Deteksi Enter
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                executeSearch();
            }
        });

        // Deteksi Input (Real-time Preview)
        inputField.addEventListener('input', function() {
            if (this.value.length > 0) {
                statusBox.style.display = "block";
                previewText.innerText = `"${this.value}"`;
            } else {
                statusBox.style.display = "none";
            }
        });
    </script>
</body>
</html>
